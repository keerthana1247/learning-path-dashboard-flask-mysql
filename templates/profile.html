{% extends "base.html" %}
{% block title %}Profile — LearnPath{% endblock %}
{% block content %}

<div class="topbar">
  <div>
    <span class="eyebrow">Your details</span>
    <h1>Profile</h1>
  </div>
</div>

<div class="card" style="max-width:640px;">
  <form method="POST" action="{{ url_for('profile.profile') }}">
    <div class="field">
      <label for="name">Full name</label>
      <input type="text" id="name" name="name" value="{{ current_user.name }}" required>
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" value="{{ current_user.email }}" disabled style="opacity:0.6;">
    </div>
    <div class="grid grid-2">
      <div class="field">
        <label for="college">College</label>
        <input type="text" id="college" name="college" value="{{ current_user.college or '' }}" placeholder="e.g. Anna University">
      </div>
      <div class="field">
        <label for="department">Department</label>
        <input type="text" id="department" name="department" value="{{ current_user.department or '' }}" placeholder="e.g. Computer Science">
      </div>
    </div>
    <div class="grid grid-2">
      <div class="field">
        <label for="year">Year</label>
        <select id="year" name="year">
          {% for y in ["1st Year", "2nd Year", "3rd Year", "4th Year", "Graduate", "Professional"] %}
            <option value="{{ y }}" {{ 'selected' if current_user.year == y }}>{{ y }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="field">
        <label for="career_goal">Career goal</label>
        <select id="career_goal" name="career_goal">
          <option value="">Select a goal</option>
          {% for goal in career_goals %}
            <option value="{{ goal }}" {{ 'selected' if current_user.career_goal == goal }}>{{ goal }}</option>
          {% endfor %}
        </select>
      </div>
    </div>
    <div class="field">
      <label for="interests">Interests</label>
      <textarea id="interests" name="interests" placeholder="e.g. Backend systems, data engineering, product design">{{ current_user.interests or '' }}</textarea>
    </div>
    <button type="submit" class="btn btn-primary">Save changes</button>
  </form>
</div>

{% endblock %}
